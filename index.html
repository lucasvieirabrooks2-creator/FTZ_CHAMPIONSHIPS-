<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship - Player Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070d; --card: #111827; --danger: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid var(--primary); sticky: top; }
        nav button { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--primary); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #1e293b; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; }
        
        /* Estilo do Card do Jogador */
        .player-card { background: linear-gradient(135deg, #111827 0%, #000 100%); border: 2px solid var(--primary); border-radius: 20px; padding: 20px; text-align: center; position: relative; overflow: hidden; }
        .player-photo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; }
        .team-shield { width: 40px; height: 40px; position: absolute; top: 20px; right: 20px; border-radius: 5px; }
        .player-name { font-size: 24px; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .team-name { color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn { background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-align: center; display: block; text-decoration: none; }
        .label-file { display: block; font-size: 12px; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">Início</button>
    <button onclick="showPage('cadastro')" id="btn-cadastro">Criar Perfil</button>
    <button onclick="showPage('atletas')" id="btn-atletas">Atletas</button>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h1>FTz R6 MOBILE</h1>
        <div class="card" style="text-align: center;">
            <p>Crie seu perfil oficial e entre para o ranking.</p>
            <button class="btn" onclick="showPage('cadastro')">COMEÇAR CADASTRO</button>
        </div>
    </div>

    <div id="cadastro" class="page">
        <h2>Seu Perfil de Atleta</h2>
        <div class="card">
            <input id="pNome" placeholder="Seu Nickname">
            <input id="pTime" placeholder="Nome da sua Equipe">
            <input id="pUbi" placeholder="ID do Tracker.gg (Ex: 5310a588...)">
            
            <label class="label-file">Sua Foto de Jogador:</label>
            <input type="file" id="fotoFile" accept="image/*">
            
            <label class="label-file">Escudo da Equipe:</label>
            <input type="file" id="shieldFile" accept="image/*">
            
            <button class="btn" onclick="uploadData()">SALVAR PERFIL</button>
        </div>
    </div>

    <div id="atletas" class="page">
        <h2>Jogadores Registrados</h2>
        <div id="listaAtletas"></div>
    </div>
</div>

<script>
    // Seus dados do Firebase (usando os das suas imagens anteriores)
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('btn-'+pageId).classList.add('active');
    }

    async function uploadData() {
        const nome = document.getElementById('pNome').value;
        const time = document.getElementById('pTime').value;
        const ubi = document.getElementById('pUbi').value;
        const foto = document.getElementById('fotoFile').files[0];
        const escudo = document.getElementById('shieldFile').files[0];

        if(!nome || !foto) return alert("Nome e Foto são obrigatórios!");

        alert("Enviando dados... aguarde.");

        // Upload da Foto
        const fotoRef = storage.ref('jogadores/' + nome + '_foto');
        await fotoRef.put(foto);
        const fotoURL = await fotoRef.getDownloadURL();

        // Upload do Escudo (se houver)
        let escudoURL = "";
        if(escudo) {
            const escRef = storage.ref('equipes/' + time + '_escudo');
            await escRef.put(escudo);
            escudoURL = await escRef.getDownloadURL();
        }

        db.ref('inscricoes/').push({
            nome, time, ubiID: ubi, fotoURL, escudoURL, status: "aprovado", wins: 0, mvps: 0
        }).then(() => {
            alert("Perfil Criado!");
            showPage('atletas');
        });
    }

    db.ref('inscricoes/').on('value', (snapshot) => {
        const data = snapshot.val();
        const lista = document.getElementById('listaAtletas');
        lista.innerHTML = "";
        
        for(let id in data) {
            const p = data[id];
            const trackerUrl = `https://tracker.gg/r6mobile/profile/ign/${p.ubiID}/overview`;
            
            lista.innerHTML += `
                <div class="player-card" style="margin-bottom:20px;">
                    ${p.escudoURL ? `<img src="${p.escudoURL}" class="team-shield">` : ''}
                    <img src="${p.fotoURL}" class="player-photo">
                    <div class="player-name">${p.nome}</div>
                    <div class="team-name">${p.time || 'Sem Equipe'}</div>
                    <div style="margin-top:10px; font-size:12px;">Wins: ${p.wins} | MVPs: ${p.mvps}</div>
                    <a href="${trackerUrl}" target="_blank" class="btn" style="margin-top:15px; font-size:12px;">TRACKER.GG STATS</a>
                </div>`;
        }
    });
</script>
</body>
</html>

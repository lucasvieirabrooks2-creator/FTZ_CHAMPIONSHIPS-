<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship - R6 Mobile Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070d; --card: #111827; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); overflow-x: auto; }
        nav button { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px; }
        h1, h2, h3 { color: var(--primary); text-align: center; text-transform: uppercase; margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
        .btn-danger { background: var(--danger); color: white; }
        
        .comp-item { border-left: 4px solid var(--primary); padding: 15px; background: #1a2236; border-radius: 8px; margin-bottom: 15px; position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-camp { background: var(--danger); color: white; }
        .badge-liga { background: var(--success); color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--primary); font-size: 12px; padding: 8px; border-bottom: 1px solid #334155; }
        td { padding: 10px 8px; border-bottom: 1px solid #1e293b; font-size: 14px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">Início</button>
    <button onclick="showPage('competicoes')" id="btn-competicoes">Torneios e Ligas</button>
    <button onclick="showPage('tabela')" id="btn-tabela">Tabela/Ligas</button>
    <button onclick="showPage('admin')" id="btn-admin">ADM</button>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h1>FTz R6 MOBILE</h1>
        <div class="card" style="text-align: center;">
            <p>Gerencie sua carreira e competições no R6M.</p>
            <button class="btn" onclick="showPage('competicoes')">VER EVENTOS</button>
        </div>
    </div>

    <div id="competicoes" class="page">
        <h2>Eventos Ativos</h2>
        <div id="listaCompeticoes"></div>
    </div>

    <div id="tabela" class="page">
        <h2>Tabela da Liga</h2>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Atleta</th>
                        <th>PTS</th>
                        <th>V</th>
                        <th>D</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <div id="admin" class="page">
        <h1>Painel de Controle</h1>
        <div class="card">
            <input type="password" id="adminSenha" placeholder="Senha ADM">
            
            <div class="card" style="border: 1px solid var(--primary);">
                <h3>Novo Torneio/Liga</h3>
                <input id="compNome" placeholder="Nome do Campeonato">
                <select id="compTipo">
                    <option value="campeonato">Campeonato (Mata-mata)</option>
                    <option value="liga">Liga (Pontos Corridos)</option>
                </select>
                <button class="btn" onclick="criarCompeticao()">PUBLICAR</button>
            </div>

            <h3>⚙️ Gerenciar Eventos</h3>
            <div id="adminListaEventos"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.firebasestorage.app",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f",
        measurementId: "G-8N28DNQEGN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(document.getElementById('btn-' + pageId)) document.getElementById('btn-' + pageId).classList.add('active');
    }

    function criarCompeticao() {
        if(document.getElementById('adminSenha').value !== "FTZ123") return alert("Senha?");
        const nome = document.getElementById('compNome').value;
        const tipo = document.getElementById('compTipo').value;
        if(!nome) return;
        db.ref('eventos/').push({ nome, tipo, status: "aberto" });
        document.getElementById('compNome').value = "";
    }

    function excluirEvento(id) {
        if(document.getElementById('adminSenha').value !== "FTZ123") return alert("Senha?");
        if(confirm("Tem certeza que deseja excluir este evento permanentemente?")) {
            db.ref('eventos/' + id).remove();
        }
    }

    db.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const eventos = data.eventos || {};
        const atletas = data.inscricoes || {};

        const listaPublica = document.getElementById('listaCompeticoes');
        const listaAdmin = document.getElementById('adminListaEventos');
        const corpoTabela = document.getElementById('corpoTabela');
        
        listaPublica.innerHTML = ""; listaAdmin.innerHTML = ""; corpoTabela.innerHTML = "";

        // Lógica de Eventos
        for(let id in eventos) {
            const e = eventos[id];
            const badgeClass = e.tipo === 'campeonato' ? 'badge-camp' : 'badge-liga';
            
            listaPublica.innerHTML += `
                <div class="comp-item">
                    <span class="badge ${badgeClass}">${e.tipo.toUpperCase()}</span>
                    <h3>${e.nome}</h3>
                    <button class="btn" style="padding:5px; font-size:11px;" onclick="inscreverEvento('${id}')">Participar</button>
                </div>`;

            listaAdmin.innerHTML += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${e.nome} (${e.tipo})</span>
                    <button class="btn-danger" style="padding:5px 10px; border-radius:5px; border:none; cursor:pointer;" onclick="excluirEvento('${id}')">EXCLUIR</button>
                </div>`;
        }

        // Lógica da Tabela (Baseada nos atletas aprovados)
        const ranking = [];
        for(let id in atletas) {
            if(atletas[id].status === "aprovado") {
                ranking.push({
                    nome: atletas[id].nome,
                    v: atletas[id].wins || 0,
                    d: atletas[id].losses || 0,
                    pts: (atletas[id].wins || 0) * 3 // Exemplo: 3 pontos por vitória
                });
            }
        }
        ranking.sort((a,b) => b.pts - a.pts);
        
        ranking.forEach((atleta, i) => {
            corpoTabela.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td>${atleta.nome}</td>
                    <td style="color:var(--primary); font-weight:bold;">${atleta.pts}</td>
                    <td>${atleta.v}</td>
                    <td>${atleta.d}</td>
                </tr>`;
        });
    });

    function inscreverEvento(id) {
        const nick = prompt("Seu nick aprovado:");
        if(nick) db.ref('eventos/' + id + '/participantes').push(nick);
    }
</script>
</body>
</html>

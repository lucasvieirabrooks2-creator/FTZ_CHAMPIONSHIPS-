<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTz Ultra App</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:sans-serif}
.container{padding:15px}
.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}
input,select,textarea{width:100%;padding:10px;margin:5px 0;background:#000;border:1px solid #333;color:#fff}
button{width:100%;padding:12px;background:#00eaff;border:none;font-weight:bold;border-radius:8px}
.nav{display:flex;gap:5px;overflow:auto;margin-bottom:10px}
.nav button{flex:1;background:#111}
.hidden{display:none}
.item{padding:10px;border-bottom:1px solid #222}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="auth">
<div class="card">
<h3>Login</h3>
<input id="email">
<input id="senha" type="password">
<button onclick="App.Auth.login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="nav">
<button onclick="App.UI.go('teams')">Times</button>
<button onclick="App.UI.go('tournaments')">Torneios</button>
<button onclick="App.UI.go('matches')">Partidas</button>
<button onclick="App.UI.go('ranking')">Ranking</button>
<button onclick="App.UI.go('admin')" id="btnAdmin" class="hidden">Admin</button>
</div>

<!-- TIMES -->
<div id="teams" class="page">
<div class="card">
<input id="teamName" placeholder="Nome">
<input id="tag" placeholder="TAG">
<textarea id="players" placeholder="5 players"></textarea>
<button onclick="App.Teams.create()">Criar</button>
</div>
<div class="card"><div id="teamList"></div></div>
</div>

<!-- MATCHES -->
<div id="matches" class="page hidden">
<div class="card">
<select id="t1"></select>
<select id="t2"></select>
<select id="map">
<option>Oregon</option>
<option>Clubhouse</option>
<option>Bank</option>
</select>
<input id="s1">
<input id="s2">
<input id="mvp">
<button onclick="App.Match.create()">Registrar</button>
</div>
<div class="card"><div id="history"></div></div>
</div>

<!-- RANK -->
<div id="ranking" class="page hidden">
<div class="card"><div id="rank"></div></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page hidden">
<div class="card">
<input id="tournamentName">
<button onclick="App.Tournament.create()">Criar Torneio</button>
<button onclick="App.Tournament.bracket()">Gerar Chaveamento</button>
</div>
</div>

</div>
</div>

<script>

// ================= CORE =================
const App = {
 state:{user:null,admin:false},

 init(){
 firebase.initializeApp({
 apiKey:"SUA_KEY",
 authDomain:"SEU_AUTH",
 databaseURL:"SEU_DB",
 projectId:"SEU_ID"
 });

 this.auth=firebase.auth();
 this.db=firebase.database();

 this.bindAuth();
 this.loadData();
 },

 bindAuth(){
 this.auth.onAuthStateChanged(user=>{
 if(user){
 this.state.user=user;
 authDiv.style.display="none";
 app.classList.remove("hidden");

 const ref=this.db.ref("users/"+user.uid);

 ref.once("value",s=>{
 if(!s.exists()) ref.set({role:"player"});
 });

 ref.on("value",s=>{
 this.state.admin=s.val().role==="admin";
 btnAdmin.classList.toggle("hidden",!this.state.admin);
 });

 }else{
 authDiv.style.display="block";
 app.classList.add("hidden");
 }
 });
 },

 // ================= AUTH =================
 Auth:{
 login(){
 App.auth.signInWithEmailAndPassword(email.value,senha.value)
 .catch(()=>App.auth.createUserWithEmailAndPassword(email.value,senha.value));
 }
 },

 // ================= UI =================
 UI:{
 go(p){
 document.querySelectorAll(".page").forEach(e=>e.classList.add("hidden"));
 document.getElementById(p).classList.remove("hidden");
 }
 },

 // ================= TEAMS =================
 Teams:{
 create(){
 App.db.ref("teams").push({
 nome:teamName.value,
 tag:tag.value,
 players:players.value.split(","),
 owner:App.state.user.uid,
 wins:0
 });
 }
 },

 // ================= TOURNAMENT =================
 Tournament:{
 create(){
 if(!App.state.admin)return;
 App.db.ref("tournaments").push({nome:tournamentName.value});
 },
 bracket(){
 App.db.ref("inscricoes").once("s=>{
 const ins=Object.values(s.val()||{});
 let p=[];
 for(let i=0;i<ins.length;i+=2){
 if(ins[i+1]) p.push({t1:ins[i].team,t2:ins[i+1].team});
 }
 App.db.ref("matches").set(p);
 });
 }
 },

 // ================= MATCH =================
 Match:{
 create(){
 if(!App.state.admin)return;

 const winner = s1.value > s2.value ? t1.value : t2.value;

 App.db.ref("history").push({
 t1:t1.value,t2:t2.value,
 map:map.value,
 s1:s1.value,s2:s2.value,
 mvp:mvp.value,
 winner
 });

 App.db.ref("teams/"+winner+"/wins")
 .transaction(x=>(x||0)+1);
 }
 },

 // ================= DATA =================
 loadData(){

 // teams
 this.db.ref("teams").on("value",snap=>{
 const d=snap.val()||{};
 t1.innerHTML=""; t2.innerHTML="";
 teamList.innerHTML="";

 Object.entries(d).forEach(([id,t])=>{
 t1.innerHTML+=`<option value="${id}">${t.nome}</option>`;
 t2.innerHTML+=`<option value="${id}">${t.nome}</option>`;
 teamList.innerHTML+=`<div class="item">${t.tag} ${t.nome}</div>`;
 });
 });

 // history
 this.db.ref("history").on("value",snap=>{
 const d=snap.val()||{};
 history.innerHTML="";
 Object.values(d).reverse().forEach(p=>{
 history.innerHTML+=`
 <div class="item">
 ${p.map} | ${p.s1}x${p.s2} | MVP: ${p.mvp}
 </div>`;
 });
 });

 // ranking
 this.db.ref("teams").on("value",snap=>{
 const d=Object.values(snap.val()||{}).sort((a,b)=>b.wins-a.wins);
 rank.innerHTML="";
 d.forEach((t,i)=>{
 rank.innerHTML+=`<div class="item">#${i+1} ${t.nome} - ${t.wins}</div>`;
 });
 });

 }

};

App.init();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship | IA News Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #020406; --card: #0a0e14; --accent: #7000ff; --text: #d1d5db; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); }
        
        nav { background: rgba(0,0,0,0.9); padding: 12px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); backdrop-filter: blur(10px); }
        nav button { background: none; border: none; color: #666; cursor: pointer; font-weight: 700; font-size: 11px; text-transform: uppercase; padding: 10px; transition: 0.3s; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 700px; margin: auto; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilo das Notícias IA */
        .news-card { background: var(--card); border: 1px solid #1c2128; border-left: 5px solid var(--primary); border-radius: 4px 12px 12px 4px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .news-card::before { content: 'AI GENERATED'; position: absolute; top: 5px; right: -25px; background: var(--accent); color: white; font-size: 8px; padding: 2px 30px; transform: rotate(45deg); font-weight: bold; }
        .news-tag { background: rgba(0, 240, 255, 0.1); color: var(--primary); font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .news-date { font-size: 11px; color: #555; margin-top: 10px; display: block; }
        .news-title { color: #fff; font-size: 20px; margin: 10px 0; font-weight: 700; }

        /* Painel ADM IA */
        .ai-box { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; }
        .btn-ai { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-transform: uppercase; box-shadow: 0 0 15px rgba(112, 0, 255, 0.3); }
        
        textarea, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #1e293b; background: #000; color: #fff; box-sizing: border-box; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">News Feed</button>
    <button onclick="showPage('ranking')" id="btn-ranking">Ranking</button>
    <button onclick="showPage('adm')" id="btn-adm">Painel IA</button>
</nav>

<div class="container">
    
    <div id="home" class="page active">
        <h2 style="text-align: center; color: var(--primary);">COMUNICAÇÕES DO SISTEMA</h2>
        <div id="feedIA"></div>
    </div>

    <div id="ranking" class="page">
        <h2>Top Performance</h2>
        <div id="listaRanking"></div>
    </div>

    <div id="adm" class="page">
        <h2>Gerador de Notícias IA</h2>
        <div class="card ai-box">
            <p style="font-size: 12px; color: var(--accent);">Dê um tópico e a IA escreverá a notícia completa.</p>
            <select id="newsType">
                <option value="resultado">Resultado de Jogo</option>
                <option value="mercado">Mercado/Transferência</option>
                <option value="aviso">Aviso da Staff</option>
            </select>
            <textarea id="aiTopic" placeholder="Ex: FTz venceu a final contra a Team Zeus por 7-2 no mapa Oregon."></textarea>
            <button class="btn-ai" onclick="gerarNoticiaIA()">GERAR E POSTAR COM IA</button>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h3>Segurança</h3>
            <input type="password" id="admPass" placeholder="Senha Master">
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-'+id).classList.add('active');
    }

    // LÓGICA DO GERADOR IA
    function gerarNoticiaIA() {
        const topic = document.getElementById('aiTopic').value;
        const type = document.getElementById('newsType').value;
        
        if(!topic) return alert("Digite um tópico primeiro!");

        // Simulando o processamento da IA para criar um texto profissional
        let tituloIA = "";
        let corpoIA = "";

        if(type === "resultado") {
            tituloIA = "CONFRONTO FINALIZADO NO SERVIDOR";
            corpoIA = `Em uma partida eletrizante, os dados foram processados: ${topic}. A performance dos atletas superou as expectativas da liga.`;
        } else if(type === "mercado") {
            tituloIA = "MOVIMENTAÇÃO NO MERCADO DE ELITE";
            corpoIA = `As organizações se movem nas sombras. Informação confirmada: ${topic}. O cenário competitivo acaba de mudar.`;
        } else {
            tituloIA = "COMUNICADO PRIORITÁRIO DA STAFF";
            corpoIA = `Atenção todos os atletas e torcedores. Foi decidido que: ${topic}. Fiquem atentos para futuras atualizações.`;
        }

        db.ref('noticiasIA/').push({
            titulo: tituloIA,
            corpo: corpoIA,
            tipo: type,
            data: new Date().toLocaleString('pt-BR')
        }).then(() => {
            document.getElementById('aiTopic').value = "";
            alert("Notícia gerada com sucesso!");
            showPage('home');
        });
    }

    // RENDERIZAÇÃO EM TEMPO REAL
    db.ref().on('value', snap => {
        const d = snap.val() || {};
        const noticias = d.noticiasIA || {};
        const feed = document.getElementById('feedIA');
        
        feed.innerHTML = "";

        // Ordenar as mais recentes primeiro
        const keys = Object.keys(noticias).reverse();
        
        keys.forEach(id => {
            const n = noticias[id];
            feed.innerHTML += `
                <div class="news-card">
                    <span class="news-tag">${n.tipo}</span>
                    <h3 class="news-title">${n.titulo}</h3>
                    <p style="line-height: 1.5; font-size: 14px;">${n.corpo}</p>
                    <span class="news-date">Sincronizado em: ${n.data}</span>
                </div>`;
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championships | Tournament Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070a; --card: #0d1117; --accent: #7000ff; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; }
        
        /* Nav Estilo Arena */
        nav { background: #000; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tournament Cards */
        .event-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; overflow: hidden; margin-bottom: 20px; transition: 0.3s; }
        .event-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .event-banner { width: 100%; height: 150px; background: linear-gradient(45deg, #111, #222); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
        .event-info { padding: 15px; }
        .status-badge { background: #00ff88; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* Forms */
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: inherit; }
        .btn-action { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        h2 { border-left: 4px solid var(--primary); padding-left: 10px; font-size: 18px; text-transform: uppercase; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <button onclick="showPage('eventos')" id="btn-eventos" class="active">Campeonatos</button>
    <button onclick="showPage('ranking')" id="btn-ranking">Ranking</button>
    <button onclick="showPage('news')" id="btn-news">Feed</button>
    <button onclick="showPage('adm')" id="btn-adm">Painel ADM</button>
</nav>

<div class="container">
    
    <div id="eventos" class="page active">
        <h2>Torneios Ativos</h2>
        <div id="listaEventos">
            </div>
    </div>

    <div id="ranking" class="page">
        <h2>Hall de Elite</h2>
        <div id="listaRanking"></div>
    </div>

    <div id="news" class="page">
        <h2>Notícias da Liga</h2>
        <div id="feedIA"></div>
    </div>

    <div id="adm" class="page">
        <h2>Gerenciador de Torneios</h2>
        <div class="card" style="background: #0d1117; padding: 20px; border-radius: 12px;">
            <p style="color: var(--primary); font-size: 12px;">CRIE UM NOVO CAMPEONATO ABAIXO</p>
            <input id="evNome" placeholder="Nome do Campeonato (Ex: Copa FTz)">
            <select id="evTipo">
                <option value="Mata-mata">Mata-mata (Eliminação)</option>
                <option value="Pontos Corridos">Pontos Corridos (Liga)</option>
            </select>
            <input id="evPremio" placeholder="Premiação (Ex: R$ 500,00 + Troféu)">
            <input id="evData" type="date">
            <button class="btn-action" onclick="criarCampeonato()">PUBLICAR CAMPEONATO</button>
        </div>
        
        <hr style="border: 0.5px solid #222; margin: 30px 0;">
        <h3>Postar Notícia com IA</h3>
        <textarea id="aiTopic" placeholder="Tópico rápido da notícia..."></textarea>
        <button class="btn-action" style="background: var(--accent); color: white;" onclick="postarIA()">GERAR NOTÍCIA</button>
    </div>

</div>

<script>
    // Configuração do seu Firebase (ftzchampionships)
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-'+id).classList.add('active');
    }

    // Criar Campeonato
    function criarCampeonato() {
        const nome = document.getElementById('evNome').value;
        if(!nome) return alert("Nome do torneio é obrigatório!");

        db.ref('eventos/').push({
            nome: nome,
            tipo: document.getElementById('evTipo').value,
            premio: document.getElementById('evPremio').value,
            data: document.getElementById('evData').value,
            status: "Inscrições Abertas"
        }).then(() => {
            alert("Campeonato Criado!");
            showPage('eventos');
        });
    }

    // Notícia IA
    function postarIA() {
        const t = document.getElementById('aiTopic').value;
        db.ref('noticiasIA/').push({
            titulo: "UPDATE DA LIGA",
            corpo: "O sistema processou novas informações: " + t,
            data: new Date().toLocaleDateString()
        });
        alert("Notícia postada!");
    }

    // Renderização Realtime
    db.ref().on('value', snap => {
        const d = snap.val() || {};
        const eventos = d.eventos || {};
        const noticias = d.noticiasIA || {};

        const listaEventos = document.getElementById('listaEventos');
        listaEventos.innerHTML = "";

        for(let id in eventos) {
            const ev = eventos[id];
            listaEventos.innerHTML += `
                <div class="event-card">
                    <div class="event-banner">BANNER DO EVENTO</div>
                    <div class="event-info">
                        <span class="status-badge">${ev.status}</span>
                        <h3 style="margin: 10px 0;">${ev.nome}</h3>
                        <p style="font-size: 12px; color: #888;">Tipo: ${ev.tipo} | Premiação: ${ev.premio}</p>
                        <button class="btn-action" style="padding: 8px; font-size: 10px; margin-top: 10px;">INSCREVER MEU TIME</button>
                    </div>
                </div>`;
        }

        const feed = document.getElementById('feedIA');
        feed.innerHTML = "";
        for(let id in noticias) {
            feed.innerHTML = `<div class="card" style="padding:15px; margin-bottom:10px; border-left: 3px solid var(--accent); background:#0d1117;">
                <b style="color:var(--accent)">${noticias[id].titulo}</b>
                <p style="font-size:13px;">${noticias[id].corpo}</p>
            </div>` + feed.innerHTML;
        }
    });
</script>
</body>
</html>

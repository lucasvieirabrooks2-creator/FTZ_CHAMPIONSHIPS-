<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship - Hub Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070d; --card: #111827; --danger: #ef4444; --success: #22c55e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); overflow-x: auto; }
        nav button { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px; }
        h1, h2, h3 { color: var(--primary); text-align: center; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 10px; }
        
        .player-card { background: linear-gradient(135deg, #111827 0%, #000 100%); border: 2px solid var(--primary); border-radius: 20px; padding: 20px; text-align: center; position: relative; margin-bottom: 20px; }
        .player-photo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .team-shield { width: 40px; height: 40px; position: absolute; top: 15px; right: 15px; border-radius: 5px; background: #000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--primary); font-size: 11px; padding: 8px; border-bottom: 1px solid #334155; }
        td { padding: 10px 8px; border-bottom: 1px solid #1e293b; font-size: 13px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">Início</button>
    <button onclick="showPage('cadastro')" id="btn-cadastro">Meu Perfil</button>
    <button onclick="showPage('competicoes')" id="btn-competicoes">Eventos</button>
    <button onclick="showPage('tabela')" id="btn-tabela">Ranking/Liga</button>
    <button onclick="showPage('admin')" id="btn-admin">ADM</button>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h1>FTz Championships</h1>
        <div class="card" style="text-align: center;">
            <p>Plataforma de gestão e competições R6 Mobile.</p>
            <button class="btn" onclick="showPage('cadastro')">CRIAR MEU PERFIL</button>
        </div>
    </div>

    <div id="cadastro" class="page">
        <h2>Cadastro de Atleta</h2>
        <div class="card">
            <input id="pNome" placeholder="Seu Nickname">
            <input id="pTime" placeholder="Nome da Equipe">
            <input id="pUbi" placeholder="ID do Tracker.gg (Ex: 5310a588...)">
            <input id="pFotoURL" placeholder="Link da sua Foto (URL)">
            <input id="pEscudoURL" placeholder="Link do Escudo (URL)">
            <button class="btn" onclick="salvarPerfil()">SOLICITAR APROVAÇÃO</button>
        </div>
    </div>

    <div id="competicoes" class="page">
        <h2>Torneios Ativos</h2>
        <div id="listaCompeticoes"></div>
    </div>

    <div id="tabela" class="page">
        <h2>Ranking e Atletas</h2>
        <div id="listaAtletas"></div>
        <div class="card">
            <h3>Classificação</h3>
            <table>
                <thead><tr><th>#</th><th>Atleta</th><th>PTS</th><th>V</th></tr></thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <div id="admin" class="page">
        <h1>Painel Admin</h1>
        <div class="card">
            <input type="password" id="adminSenha" placeholder="Senha ADM">
            
            <div class="card" style="border-color: var(--primary); margin-top: 15px;">
                <h3>Novo Evento</h3>
                <input id="compNome" placeholder="Nome do Evento">
                <select id="compTipo">
                    <option value="campeonato">Campeonato</option>
                    <option value="liga">Liga</option>
                </select>
                <button class="btn" onclick="criarEvento()">PUBLICAR</button>
            </div>

            <div class="card" style="margin-top: 15px;">
                <h3>Aprovar Atletas</h3>
                <div id="listaAprovacao"></div>
            </div>

            <div class="card" style="margin-top: 15px;">
                <h3>Gerenciar Eventos</h3>
                <div id="adminListaEventos"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configurações do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(document.getElementById('btn-'+pageId)) document.getElementById('btn-'+pageId).classList.add('active');
    }

    function salvarPerfil() {
        const dados = {
            nome: document.getElementById('pNome').value,
            time: document.getElementById('pTime').value,
            ubiID: document.getElementById('pUbi').value,
            fotoURL: document.getElementById('pFotoURL').value,
            escudoURL: document.getElementById('pEscudoURL').value,
            status: "pendente",
            wins: 0
        };
        if(!dados.nome || !dados.fotoURL) return alert("Nick e Foto são obrigatórios!");
        db.ref('inscricoes/').push(dados).then(() => alert("Aguarde aprovação do ADM!"));
    }

    function criarEvento() {
        if(document.getElementById('adminSenha').value !== "FTZ123") return alert("Senha?");
        const nome = document.getElementById('compNome').value;
        const tipo = document.getElementById('compTipo').value;
        if(nome) db.ref('eventos/').push({ nome, tipo });
    }

    function aprovarAtleta(id) {
        if(document.getElementById('adminSenha').value !== "FTZ123") return alert("Senha?");
        db.ref('inscricoes/' + id).update({ status: "aprovado" });
    }

    function excluirEvento(id) {
        if(document.getElementById('adminSenha').value !== "FTZ123") return alert("Senha?");
        db.ref('eventos/'+id).remove();
    }

    db.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const atletas = data.inscricoes || {};
        const eventos = data.eventos || {};

        const listaAprov = document.getElementById('listaAprovacao');
        const listaCards = document.getElementById('listaAtletas');
        const corpoTab = document.getElementById('corpoTabela');
        const listaEv = document.getElementById('listaCompeticoes');
        const adminEv = document.getElementById('adminListaEventos');

        listaAprov.innerHTML = ""; listaCards.innerHTML = ""; corpoTab.innerHTML = ""; listaEv.innerHTML = ""; adminEv.innerHTML = "";

        for(let id in eventos) {
            const e = eventos[id];
            listaEv.innerHTML += `<div class="card"><h3>${e.nome}</h3><p>${e.tipo}</p></div>`;
            adminEv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${e.nome}</span><button class="btn-danger" onclick="excluirEvento('${id}')">X</button></div>`;
        }

        const ranking = [];
        for(let id in atletas) {
            const p = atletas[id];
            if(p.status === "pendente") {
                listaAprov.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.nome}</span><button class="btn" style="width:70px; margin:0; font-size:10px;" onclick="aprovarAtleta('${id}')">OK</button></div>`;
            } else {
                const tracker = `https://tracker.gg/r6mobile/profile/ign/${p.ubiID}/overview`;
                listaCards.innerHTML += `
                    <div class="player-card">
                        <img src="${p.escudoURL}" class="team-shield">
                        <img src="${p.fotoURL}" class="player-photo">
                        <div style="font-size:22px; font-weight:bold; color:var(--primary);">${p.nome}</div>
                        <div style="color:#aaa; font-size:12px;">${p.time}</div>
                        <a href="${tracker}" target="_blank" class="btn" style="font-size:10px; margin-top:10px;">TRACKER STATS</a>
                    </div>`;
                ranking.push({ nome: p.nome, pts: (p.wins || 0) * 3, v: p.wins || 0 });
            }
        }

        ranking.sort((a,b) => b.pts - a.pts).forEach((atleta, i) => {
            corpoTab.innerHTML += `<tr><td>${i+1}</td><td>${atleta.nome}</td><td>${atleta.pts}</td><td>${atleta.v}</td></tr>`;
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Tournament Platform | PRO System</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070a; --card: #0d1117; --accent: #7000ff; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; }
        
        /* Navbar */
        nav { background: #000; padding: 12px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { background: none; border: none; color: #555; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo dos Cards e Inputs */
        .card { background: var(--card); border: 1px solid #30363d; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-main:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--primary); }

        /* Perfil Header */
        .p-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .p-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav id="mainNav">
    <button onclick="showPage('auth')" id="btn-auth" class="active">Login/Criar</button>
    <button onclick="showPage('perfil')" id="btn-perfil" style="display:none;">Meu Perfil</button>
    <button onclick="showPage('campeonatos')" id="btn-campeonatos">Eventos</button>
    <button onclick="showPage('inscricao')" id="btn-inscricao">Inscrição</button>
    <button onclick="showPage('adm')" id="btn-adm">ADM</button>
</nav>

<div class="container">
    
    <div id="auth" class="page active">
        <h2>Acesso à Plataforma</h2>
        <div class="card">
            <h3>Entrar</h3>
            <input id="loginUser" placeholder="Usuário/Nick">
            <input id="loginPass" type="password" placeholder="Senha">
            <button class="btn-main" onclick="realizarLogin()">Entrar no Sistema</button>
        </div>
        <div class="card" style="border-top: 2px solid var(--accent);">
            <h3>Criar Novo Perfil</h3>
            <input id="regUser" placeholder="Nick de Atleta">
            <input id="regPass" type="password" placeholder="Defina uma Senha">
            <input id="regUbi" placeholder="ID Ubisoft (Stats)">
            <button class="btn-main" style="background: var(--accent); color: white;" onclick="criarConta()">Cadastrar Atleta</button>
        </div>
    </div>

    <div id="perfil" class="page">
        <h2>Passaporte do Atleta</h2>
        <div class="card">
            <div class="p-header">
                <img id="pFoto" src="https://i.imgur.com/89SByG1.png" class="p-img">
                <div>
                    <h3 id="pNick" style="margin:0;">Atleta</h3>
                    <small id="pStatus" style="color:var(--primary)">Status: Ativo</small>
                </div>
            </div>
            <div id="pStats" style="font-size: 14px; color: #888;">
                Ubisoft ID: <span id="pUbiID" style="color: #fff;">-</span>
            </div>
            <button class="btn-main" style="margin-top:20px; background:#222; color:#fff;" onclick="logout()">Sair da Conta</button>
        </div>
    </div>

    <div id="inscricao" class="page">
        <h2>Inscrição de Equipe</h2>
        <div class="card">
            <p style="font-size: 12px; color: #888;">Somente capitães podem inscrever a line-up completa.</p>
            <select id="insSelectTorneio"></select>
            <input id="insTime" placeholder="Nome da Equipe/Org">
            <textarea id="insLine" placeholder="Line-up: Nick1, Nick2, Nick3, Nick4, Nick5" rows="4"></textarea>
            <button class="btn-main" onclick="inscreverEquipe()">Finalizar Inscrição</button>
        </div>
    </div>

    <div id="campeonatos" class="page">
        <h2>Torneios Ativos</h2>
        <div id="listaEventos"></div>
    </div>

    <div id="adm" class="page">
        <h2>Painel Master</h2>
        <div class="card">
            <h3>Criar Torneio</h3>
            <input id="admNomeT" placeholder="Nome do Evento">
            <button class="btn-main" onclick="admCriarTorneio()">Publicar Evento</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usuarioLogado = null;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-'+id).classList.add('active');
    }

    // SISTEMA DE CONTAS
    function criarConta() {
        const user = document.getElementById('regUser').value;
        const pass = document.getElementById('regPass').value;
        const ubi = document.getElementById('regUbi').value;

        if(!user || !pass) return alert("Preencha Usuário e Senha!");

        db.ref('contas/' + user).set({
            nick: user,
            senha: pass,
            ubiID: ubi,
            wins: 0,
            foto: "https://i.imgur.com/89SByG1.png"
        }).then(() => {
            alert("Perfil criado com sucesso! Agora faça login.");
            showPage('auth');
        });
    }

    function realizarLogin() {
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;

        db.ref('contas/' + user).once('value', snap => {
            const dados = snap.val();
            if(dados && dados.senha === pass) {
                usuarioLogado = dados;
                atualizarInterfaceLogin();
                alert("Bem-vindo, " + user + "!");
                showPage('perfil');
            } else {
                alert("Usuário ou senha incorretos!");
            }
        });
    }

    function atualizarInterfaceLogin() {
        document.getElementById('btn-auth').style.display = 'none';
        document.getElementById('btn-perfil').style.display = 'block';
        document.getElementById('pNick').innerText = usuarioLogado.nick;
        document.getElementById('pUbiID').innerText = usuarioLogado.ubiID || "Não informado";
    }

    function logout() {
        usuarioLogado = null;
        location.reload();
    }

    // SISTEMA DE INSCRIÇÃO
    function inscreverEquipe() {
        if(!usuarioLogado) return alert("Você precisa estar logado para se inscrever!");
        
        const time = document.getElementById('insTime').value;
        const torneio = document.getElementById('insSelectTorneio').value;

        db.ref('inscricoesTimes/').push({
            time: time,
            torneio: torneio,
            line: document.getElementById('insLine').value,
            responsavel: usuarioLogado.nick,
            status: "Pendente"
        }).then(() => alert("Inscrição enviada!"));
    }

    // ADM
    function admCriarTorneio() {
        const nome = document.getElementById('admNomeT').value;
        db.ref('torneiosAtivos/').push({ nome }).then(() => alert("Torneio Criado!"));
    }

    // REALTIME SYNC
    db.ref().on('value', snap => {
        const d = snap.val() || {};
        const torneios = d.torneiosAtivos || {};
        
        const lista = document.getElementById('listaEventos');
        const select = document.getElementById('insSelectTorneio');
        
        lista.innerHTML = "";
        select.innerHTML = "<option>Escolha o Torneio</option>";

        for(let id in torneios) {
            lista.innerHTML += `<div class="card"><b>${torneios[id].nome}</b></div>`;
            select.innerHTML += `<option value="${torneios[id].nome}">${torneios[id].nome}</option>`;
        }
    });
</script>
</body>
</html>

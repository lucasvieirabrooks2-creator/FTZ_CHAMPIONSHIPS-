<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTz PRO System</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0f14;
    color:white;
}

.container {
    padding:15px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#000;
    border:1px solid #333;
    color:white;
}

button {
    width:100%;
    padding:12px;
    background:#00eaff;
    border:none;
    font-weight:bold;
}

.ranking {
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #222;
}
</style>
</head>

<body>

<div class="container">

<div id="auth">
    <div class="card">
        <h3>Login / Cadastro</h3>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar / Criar</button>
    </div>
</div>

<div id="app" style="display:none;">

    <div class="card">
        <h3>Meu Perfil</h3>
        <p id="userEmail"></p>
        <p>Vitórias: <span id="wins">0</span></p>
        <button onclick="logout()">Sair</button>
    </div>

    <div class="card">
        <h3>Adicionar Vitória</h3>
        <button onclick="addWin()">+1 Win</button>
    </div>

    <div class="card">
        <h3>Ranking</h3>
        <div id="ranking"></div>
    </div>

</div>

</div>

<script>

// COLE SEU FIREBASE AQUI
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  databaseURL: "SEU_DB",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// LOGIN / CADASTRO
function login(){
    const email = emailInput.value;
    const senha = senhaInput.value;

    auth.signInWithEmailAndPassword(email, senha)
    .catch(()=>{
        auth.createUserWithEmailAndPassword(email, senha);
    });
}

function logout(){
    auth.signOut();
}

// USUÁRIO LOGADO
auth.onAuthStateChanged(user=>{
    if(user){
        authDiv.style.display="none";
        app.style.display="block";

        userEmail.innerText = user.email;

        const ref = db.ref("users/"+user.uid);

        ref.once("value", snap=>{
            if(!snap.exists()){
                ref.set({wins:0});
            }
        });

        ref.on("value", snap=>{
            wins.innerText = snap.val().wins || 0;
        });

    } else {
        authDiv.style.display="block";
        app.style.display="none";
    }
});

// ADD WIN
function addWin(){
    const user = auth.currentUser;
    const ref = db.ref("users/"+user.uid+"/wins");

    ref.transaction(v => (v || 0) + 1);
}

// RANKING REALTIME
db.ref("users").on("value", snap=>{
    const data = snap.val() || {};
    const list = Object.entries(data)
        .map(([id,u]) => ({id,...u}))
        .sort((a,b)=>b.wins-a.wins);

    ranking.innerHTML = "";

    list.forEach((u,i)=>{
        ranking.innerHTML += `
        <div class="ranking">
            <span>#${i+1}</span>
            <span>${u.wins} wins</span>
        </div>`;
    });
});

</script>

</body>
</html>

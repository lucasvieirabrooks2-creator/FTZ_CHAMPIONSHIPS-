<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTz Championship PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial}
.container{padding:15px}
.card{background:#111827;padding:15px;border-radius:10px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin:5px 0;background:#000;border:1px solid #333;color:white}
button{width:100%;padding:12px;background:#00eaff;border:none;font-weight:bold}
.nav{display:flex;gap:5px;overflow:auto;margin-bottom:10px}
.nav button{flex:1;background:#111}
.hidden{display:none}
.item{padding:10px;border-bottom:1px solid #222}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="auth">
<div class="card">
<h3>Login / Cadastro</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('torneios')">Torneios</button>
<button onclick="show('perfil')">Perfil</button>
<button onclick="show('admin')" id="btnAdmin" class="hidden">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h3>Feed</h3>
<div id="feed"></div>
</div>
</div>

<!-- TORNEIOS -->
<div id="torneios" class="page hidden">
<div class="card">
<h3>Torneios</h3>
<div id="listaTorneios"></div>
</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="page hidden">
<div class="card">
<h3>Meu Perfil</h3>
<p id="userEmail"></p>
<button onclick="logout()">Sair</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page hidden">
<div class="card">
<h3>Criar Torneio</h3>
<input id="nomeTorneio" placeholder="Nome">
<input id="premio" placeholder="Premiação">
<select id="modo">
<option>Mata-mata</option>
<option>Liga</option>
</select>
<button onclick="criarTorneio()">Criar</button>
</div>
</div>

</div>

</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  databaseURL: "SEU_DB",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let isAdmin = false;

// LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .catch(()=>auth.createUserWithEmailAndPassword(email.value, senha.value));
}

function logout(){ auth.signOut(); }

// USUÁRIO
auth.onAuthStateChanged(user=>{
if(user){

authDiv.style.display="none";
app.classList.remove("hidden");
userEmail.innerText=user.email;

const ref=db.ref("users/"+user.uid);

ref.once("value",snap=>{
if(!snap.exists()){
ref.set({email:user.email, role:"player"});
}
});

ref.on("value",snap=>{
const data=snap.val();
if(data.role==="admin"){
isAdmin=true;
btnAdmin.classList.remove("hidden");
}
});

}else{
authDiv.style.display="block";
app.classList.add("hidden");
}
});

// NAVEGAÇÃO
function show(p){
document.querySelectorAll(".page").forEach(e=>e.classList.add("hidden"));
document.getElementById(p).classList.remove("hidden");
}

// ADMIN
function criarTorneio(){
if(!isAdmin) return alert("Sem permissão");

db.ref("torneios").push({
nome:nomeTorneio.value,
premio:premio.value,
modo:modo.value
});

alert("Torneio criado!");
}

// LISTAR TORNEIOS
db.ref("torneios").on("value",snap=>{
const data=snap.val()||{};
listaTorneios.innerHTML="";

Object.entries(data).forEach(([id,t])=>{
listaTorneios.innerHTML+=`
<div class="item">
<b>${t.nome}</b><br>
Premio: ${t.premio}<br>
Modo: ${t.modo}<br>
<button onclick="inscrever('${id}')">Participar</button>
</div>`;
});
});

// INSCREVER
function inscrever(id){
const user=auth.currentUser;

db.ref("inscricoes").push({
torneio:id,
user:user.uid
});

alert("Inscrito!");
}

// FEED SIMPLES
db.ref("feed").on("value",snap=>{
const data=snap.val()||{};
feed.innerHTML="";

Object.values(data).reverse().forEach(n=>{
feed.innerHTML+=`<div class="item">${n.texto}</div>`;
});
});

</script>

</body>
</html>

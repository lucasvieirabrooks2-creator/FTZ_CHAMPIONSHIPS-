<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship ULTRA PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --p: #00f0ff; --bg: #05070d; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #fff; text-align: center; }
        .card { background: #111827; margin: 15px; padding: 20px; border-radius: 12px; border: 1px solid #1e293b; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; }
        .btn { background: var(--p); color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 90%; }
        .status-badge { font-size: 0.8em; padding: 4px 8px; border-radius: 4px; background: #334155; margin-top: 5px; display: inline-block; }
        .approved { color: #4ade80; border: 1px solid #4ade80; }
    </style>
</head>
<body>

<header style="padding:40px;">
    <h1 style="color:var(--p)">FTz CHAMPIONSHIP</h1>
    <p>Área do Atleta & Estatísticas Ubisoft</p>
</header>

<div class="card">
    <h2>📝 Inscrição de Atleta</h2>
    <input id="atletaNome" placeholder="Nome Completo">
    <input id="ubiID" placeholder="ID de Estatística Ubisoft">
    <button class="btn" onclick="inscrever()">Enviar Inscrição</button>
</div>

<div class="card">
    <h2>🏆 Atletas Aprovados</h2>
    <div id="listaAtletas">Carregando atletas...</div>
</div>

<div class="card" style="border: 1px solid #ef4444; margin-top: 50px;">
    <h3 style="color:#ef4444">🛡️ Painel Administrativo</h3>
    <input type="password" id="adminSenha" placeholder="Senha ADM">
    <div id="pendentes"></div>
</div>

<script>
    // Suas chaves atualizadas
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.firebasestorage.app",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f",
        measurementId: "G-8N28DNQEGN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function inscrever() {
        const nome = document.getElementById('atletaNome').value;
        const ubi = document.getElementById('ubiID').value;
        if(!nome || !ubi) return alert("Preencha todos os campos!");

        db.ref('inscricoes/').push({
            nome: nome,
            ubiID: ubi,
            status: "pendente",
            data: new Date().toLocaleDateString()
        }).then(() => {
            alert("Inscrição enviada! Aguarde a aprovação.");
            document.getElementById('atletaNome').value = "";
            document.getElementById('ubiID').value = "";
        });
    }

    db.ref('inscricoes/').on('value', (snapshot) => {
        const data = snapshot.val();
        const lista = document.getElementById('listaAtletas');
        const pendentesDiv = document.getElementById('pendentes');
        lista.innerHTML = "";
        pendentesDiv.innerHTML = "<h4>Aguardando Aprovação:</h4>";

        if(!data) {
            lista.innerHTML = "Nenhum atleta aprovado.";
            return;
        }

        for (let id in data) {
            const p = data[id];
            if(p.status === "aprovado") {
                lista.innerHTML += `<div style="margin:10px; border-bottom:1px solid #1e293b; padding:10px;">
                    <strong>${p.nome}</strong> <br>
                    <span class="status-badge approved">ID Ubisoft: ${p.ubiID}</span>
                </div>`;
            } else {
                pendentesDiv.innerHTML += `<div style="padding:10px;">
                    ${p.nome} (${p.ubiID}) 
                    <button class="btn" style="width:auto; padding:5px 10px;" onclick="aprovar('${id}')">Aprovar</button>
                </div>`;
            }
        }
    });

    function aprovar(id) {
        const senha = document.getElementById('adminSenha').value;
        if(senha !== "FTZ123") return alert("Senha incorreta!");
        db.ref('inscricoes/' + id).update({ status: "aprovado" });
    }
</script>
</body>
</html>

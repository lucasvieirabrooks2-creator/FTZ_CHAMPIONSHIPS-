<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship - Pro Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070d; --card: #111827; --danger: #ef4444; --accent: #7000ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); overflow-x: auto; }
        nav button { background: none; border: none; color: #666; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; transition: 0.3s; }
        nav button.active { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px; }
        h1, h2, h3 { color: var(--primary); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; text-decoration: none; display: block; text-align: center; }
        
        /* Grid de Times e Partidas */
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .match-card { background: linear-gradient(to right, #111827, #1a2236); border-left: 4px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .match-vs { font-size: 18px; font-weight: bold; color: var(--primary); display: flex; justify-content: space-around; align-items: center; }
        
        .team-box { background: #000; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #1e293b; }
        .team-box img { width: 50px; height: 50px; object-fit: contain; }

        .search-bar { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,240,255,0.1); margin-bottom: 20px; }
        
        .player-row { display: flex; align-items: center; gap: 12px; background: #161d2f; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid transparent; }
        .player-row:hover { border-color: var(--primary); }
        .player-row img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">Home</button>
    <button onclick="showPage('times')" id="btn-times">Times</button>
    <button onclick="showPage('partidas')" id="btn-partidas">Partidas</button>
    <button onclick="showPage('tabela')" id="btn-tabela">Ranking</button>
    <button onclick="showPage('admin')" id="btn-admin">ADM</button>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h1>FTz Championships</h1>
        <div id="listaNews"></div>
        <button class="btn" style="background: var(--accent); color: white;" onclick="showPage('cadastro')">REGISTRAR MEU PERFIL</button>
    </div>

    <div id="cadastro" class="page">
        <h2>Criar Atleta</h2>
        <div class="card">
            <input id="pNome" placeholder="Seu Nick">
            <input id="pTime" placeholder="Nome da Equipe">
            <input id="pUbi" placeholder="ID Tracker.gg">
            <input id="pFotoURL" placeholder="URL da sua Foto (Opcional)">
            <input id="pEscudoURL" placeholder="URL do Escudo (Opcional)">
            <button class="btn" onclick="salvarPerfil()">SOLICITAR REGISTRO</button>
        </div>
    </div>

    <div id="times" class="page">
        <h2>Organizações</h2>
        <input type="text" id="buscaTime" class="search-bar" placeholder="🔍 Buscar equipe..." onkeyup="filtrarTimes()">
        <div id="gridTimes" class="grid-half"></div>
    </div>

    <div id="partidas" class="page">
        <h2>Confrontos do Dia</h2>
        <div id="listaMatches"></div>
    </div>

    <div id="tabela" class="page">
        <h2>Classificação</h2>
        <input type="text" id="buscaPlayer" class="search-bar" placeholder="🔍 Buscar jogador..." onkeyup="filtrarPlayers()">
        <div id="listaAtletas"></div>
    </div>

    <div id="admin" class="page">
        <h1>Painel Geral</h1>
        <div class="card">
            <input type="password" id="adminSenha" placeholder="Senha Master">
            
            <div class="card" style="border-color: var(--accent);">
                <h3>Marcar Partida</h3>
                <input id="mTime1" placeholder="Time 1 (Nome)">
                <input id="mTime2" placeholder="Time 2 (Nome)">
                <input id="mHora" placeholder="Horário (Ex: 21:30)">
                <button class="btn" style="background: var(--accent); color: white;" onclick="marcarPartida()">AGENDAR JOGO</button>
            </div>

            <div class="card">
                <h3>Gerenciar Jogadores</h3>
                <div id="listaAdminAtletas"></div>
            </div>

            <div class="card">
                <h3>Excluir Partidas</h3>
                <div id="adminListaMatches"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('btn-'+pageId).classList.add('active');
    }

    function salvarPerfil() {
        const nome = document.getElementById('pNome').value;
        if(!nome) return alert("Nick é obrigatório!");
        db.ref('inscricoes/').push({
            nome, ubiID: document.getElementById('pUbi').value,
            time: (document.getElementById('pTime').value || "FREE AGENT").toUpperCase(),
            fotoURL: document.getElementById('pFotoURL').value || "https://i.imgur.com/89SByG1.png",
            escudoURL: document.getElementById('pEscudoURL').value || "https://i.imgur.com/6E6v4pL.png",
            status: "pendente", wins: 0
        }).then(() => { alert("Perfil enviado!"); showPage('home'); });
    }

    // ADM FUNÇÕES
    function marcarPartida() {
        const t1 = document.getElementById('mTime1').value;
        const t2 = document.getElementById('mTime2').value;
        const hora = document.getElementById('mHora').value;
        if(t1 && t2) db.ref('partidas/').push({ t1, t2, hora });
    }

    function aprovar(id) { db.ref('inscricoes/'+id).update({ status: "aprovado" }); }
    function delMatch(id) { db.ref('partidas/'+id).remove(); }
    function addWin(id, atual) { db.ref('inscricoes/'+id).update({ wins: (atual || 0) + 1 }); }

    // REALTIME RENDER
    db.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const atletas = data.inscricoes || {};
        const partidas = data.partidas || {};
        
        const gridTimes = document.getElementById('gridTimes');
        const listaMatches = document.getElementById('listaMatches');
        const listaAtletas = document.getElementById('listaAtletas');
        const adminAtletas = document.getElementById('listaAdminAtletas');
        const adminMatches = document.getElementById('adminListaMatches');

        gridTimes.innerHTML = ""; listaMatches.innerHTML = ""; listaAtletas.innerHTML = "";
        adminAtletas.innerHTML = ""; adminMatches.innerHTML = "";

        const timesMap = {};

        // Processar Atletas
        for(let id in atletas) {
            const p = atletas[id];
            if(p.status === "pendente") {
                adminAtletas.innerHTML += `<div class="card">${p.nome} <button onclick="aprovar('${id}')">Aprovar</button></div>`;
            } else {
                // Popular Times
                if(!timesMap[p.time]) timesMap[p.time] = { nome: p.time, escudo: p.escudoURL, count: 0 };
                timesMap[p.time].count++;

                // Lista Ranking
                listaAtletas.innerHTML += `
                    <div class="player-row" data-name="${p.nome.toLowerCase()}">
                        <img src="${p.fotoURL}">
                        <div class="player-info">
                            <b>${p.nome}</b> <small>[${p.wins} VITÓRIAS]</small>
                            <p>${p.time}</p>
                        </div>
                        <a href="https://tracker.gg/r6mobile/profile/ign/${p.ubiID}/overview" target="_blank" style="font-size:10px; color:var(--primary);">STATS</a>
                    </div>`;

                adminAtletas.innerHTML += `<div style="font-size:11px; margin-bottom:5px;">${p.nome} <button onclick="addWin('${id}', ${p.wins})">+1 Win</button></div>`;
            }
        }

        // Renderizar Times
        for(let t in timesMap) {
            gridTimes.innerHTML += `
                <div class="team-box" data-team="${timesMap[t].nome.toLowerCase()}">
                    <img src="${timesMap[t].escudo}">
                    <div style="font-weight:bold; font-size:12px; color:var(--primary);">${timesMap[t].nome}</div>
                    <div style="font-size:9px; color:#666;">${timesMap[t].count} JOGADORES</div>
                </div>`;
        }

        // Renderizar Partidas
        for(let id in partidas) {
            const m = partidas[id];
            listaMatches.innerHTML += `
                <div class="match-card">
                    <div style="font-size:10px; color:var(--accent); margin-bottom:5px;">HOJE ÀS ${m.hora}</div>
                    <div class="match-vs">
                        <span>${m.t1}</span>
                        <span style="color:#333; font-size:12px;">VS</span>
                        <span>${m.t2}</span>
                    </div>
                </div>`;
            adminMatches.innerHTML += `<div>${m.t1} vs ${m.t2} <button onclick="delMatch('${id}')">X</button></div>`;
        }
    });

    // Filtros de Busca
    function filtrarPlayers() {
        let busca = document.getElementById('buscaPlayer').value.toLowerCase();
        document.querySelectorAll('.player-row').forEach(el => {
            el.style.display = el.dataset.name.includes(busca) ? "flex" : "none";
        });
    }

    function filtrarTimes() {
        let busca = document.getElementById('buscaTime').value.toLowerCase();
        document.querySelectorAll('.team-box').forEach(el => {
            el.style.display = el.dataset.team.includes(busca) ? "block" : "none";
        });
    }
</script>
</body>
</html>

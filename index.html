<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship - Hub Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070d; --card: #111827; --danger: #ef4444; --success: #22c55e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); overflow-x: auto; }
        nav button { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; transition: 0.3s; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px; position: relative; }
        h1, h2, h3 { color: var(--primary); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; transition: 0.3s; }
        
        /* Grid de Times */
        .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .team-card { background: #000; border: 1px solid #1e293b; border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; }
        .team-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .team-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }

        /* Card Jogador Estilizado */
        .player-card { background: linear-gradient(135deg, #111827 0%, #000 100%); border: 1px solid #1e293b; border-left: 4px solid var(--primary); border-radius: 10px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .player-photo-mini { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .player-info { text-align: left; flex-grow: 1; }
        .player-info b { font-size: 16px; color: var(--primary); }
        .player-info p { margin: 0; font-size: 11px; color: #888; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--primary); font-size: 11px; padding: 10px; border-bottom: 2px solid #1e293b; }
        td { padding: 12px 10px; border-bottom: 1px solid #1e293b; font-size: 14px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">Home</button>
    <button onclick="showPage('cadastro')" id="btn-cadastro">Cadastro</button>
    <button onclick="showPage('times')" id="btn-times">Equipes</button>
    <button onclick="showPage('tabela')" id="btn-tabela">Ranking</button>
    <button onclick="showPage('admin')" id="btn-admin">ADM</button>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h1>FTz Hub</h1>
        <div id="listaNews"></div>
        <div class="card" style="text-align: center;">
            <p>Seja bem-vindo ao painel competitivo da FTz.</p>
            <button class="btn" onclick="showPage('cadastro')">CRIAR MEU PERFIL</button>
        </div>
    </div>

    <div id="cadastro" class="page">
        <h2>Registro de Atleta</h2>
        <div class="card">
            <input id="pNome" placeholder="Seu Nickname">
            <input id="pTime" placeholder="Nome da Equipe (Ex: FTz Gaming)">
            <input id="pUbi" placeholder="ID Tracker.gg">
            <input id="pFotoURL" placeholder="Link da sua Foto (Opcional)">
            <input id="pEscudoURL" placeholder="Link do Escudo do Time (Opcional)">
            <button class="btn" onclick="salvarPerfil()">REGISTRAR</button>
        </div>
    </div>

    <div id="times" class="page">
        <h2>Organizações & Lines</h2>
        <div id="gridTimes" class="teams-grid"></div>
    </div>

    <div id="tabela" class="page">
        <h2>Ranking Geral</h2>
        <div class="card">
            <table>
                <thead><tr><th>#</th><th>Jogador</th><th>Time</th><th>PTS</th></tr></thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
        <h3>Todos os Atletas</h3>
        <div id="listaAtletas"></div>
    </div>

    <div id="admin" class="page">
        <h1>ADM Panel</h1>
        <div class="card">
            <input type="password" id="adminSenha" placeholder="Senha">
            <div class="card">
                <h3>Ações</h3>
                <div id="listaAdminAtletas"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.appspot.com",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const FOTO_PADRAO = "https://www.pngitem.com/pimgs/m/150-1503945_transparent-user-png-default-user-image-png-png.png";
    const ESCUDO_PADRAO = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_x1u7f3l_J8z3nE6uY4z2K_v1V_Gf0E4AFA&s";

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('btn-'+pageId).classList.add('active');
    }

    function salvarPerfil() {
        const nome = document.getElementById('pNome').value;
        if(!nome) return alert("Nick é obrigatório!");
        db.ref('inscricoes/').push({
            nome, ubiID: document.getElementById('pUbi').value,
            time: document.getElementById('pTime').value || "Sem Time",
            fotoURL: document.getElementById('pFotoURL').value || FOTO_PADRAO,
            escudoURL: document.getElementById('pEscudoURL').value || ESCUDO_PADRAO,
            status: "pendente", wins: 0
        }).then(() => alert("Enviado para aprovação!"));
    }

    function aprovar(id) { db.ref('inscricoes/'+id).update({ status: "aprovado" }); }
    function addWin(id, atual) { db.ref('inscricoes/'+id).update({ wins: (atual || 0) + 1 }); }

    db.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const atletas = data.inscricoes || {};
        
        const gridTimes = document.getElementById('gridTimes');
        const listaAtletas = document.getElementById('listaAtletas');
        const corpoTabela = document.getElementById('corpoTabela');
        const listaAdmin = document.getElementById('listaAdminAtletas');

        gridTimes.innerHTML = ""; listaAtletas.innerHTML = ""; corpoTabela.innerHTML = ""; listaAdmin.innerHTML = "";

        const timesMap = {}; // Para agrupar jogadores por time
        const ranking = [];

        for(let id in atletas) {
            const p = atletas[id];
            
            if(p.status === "pendente") {
                listaAdmin.innerHTML += `<div>${p.nome} <button onclick="aprovar('${id}')">Aprovar</button></div>`;
            } else {
                // Organizar Times
                if(!timesMap[p.time]) {
                    timesMap[p.time] = { nome: p.time, escudo: p.escudoURL, jogadores: [] };
                }
                timesMap[p.time].jogadores.push(p.nome);

                // Listar Atletas
                listaAtletas.innerHTML += `
                    <div class="player-card">
                        <img src="${p.fotoURL}" class="player-photo-mini">
                        <div class="player-info">
                            <b>${p.nome}</b>
                            <p>${p.time}</p>
                        </div>
                        <a href="https://tracker.gg/r6mobile/profile/ign/${p.ubiID}/overview" target="_blank" style="color:var(--primary); font-size:10px;">STATS</a>
                    </div>`;

                ranking.push({ nome: p.nome, time: p.time, pts: (p.wins || 0) * 3, v: p.wins || 0, id: id, wins: p.wins });
                listaAdmin.innerHTML += `<div style="font-size:12px; margin-top:5px;">${p.nome} (${p.wins}V) <button onclick="addWin('${id}', ${p.wins})">+1</button></div>`;
            }
        }

        // Renderizar Grid de Times
        for(let t in timesMap) {
            const time = timesMap[t];
            gridTimes.innerHTML += `
                <div class="team-card">
                    <img src="${time.escudo}">
                    <div style="font-weight:bold; color:var(--primary); font-size:14px;">${time.nome}</div>
                    <div style="font-size:10px; color:#888;">${time.jogadores.length} Jogadores</div>
                </div>`;
        }

        // Tabela de Classificação
        ranking.sort((a,b) => b.pts - a.pts).forEach((atleta, i) => {
            corpoTabela.innerHTML += `<tr><td>${i+1}</td><td>${atleta.nome}</td><td>${atleta.time}</td><td>${atleta.pts}</td></tr>`;
        });
    });
</script>
</body>
</html>

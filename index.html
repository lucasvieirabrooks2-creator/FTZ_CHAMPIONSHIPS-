<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTz Championship - R6 Mobile Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00f0ff; --bg: #05070d; --card: #111827; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); overflow-x: auto; }
        nav button { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px; }
        h1, h2, h3 { color: var(--primary); text-align: center; text-transform: uppercase; margin-bottom: 15px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
        
        .comp-item { border-left: 4px solid var(--primary); padding: 15px; background: #1a2236; border-radius: 8px; margin-bottom: 15px; position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-camp { background: var(--danger); color: white; }
        .badge-liga { background: var(--success); color: white; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('home')" id="btn-home" class="active">Início</button>
    <button onclick="showPage('competicoes')" id="btn-competicoes">Torneios e Ligas</button>
    <button onclick="showPage('atletas')" id="btn-atletas">Ranking</button>
    <button onclick="showPage('admin')" id="btn-admin">ADM</button>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h1>FTz R6 MOBILE</h1>
        <div class="card" style="text-align: center;">
            <p>Seja bem-vindo à elite do Rainbow Six Mobile.</p>
            <button class="btn" onclick="showPage('competicoes')">EXPLORAR COMPETIÇÕES</button>
        </div>
    </div>

    <div id="competicoes" class="page">
        <h2>Próximos Eventos</h2>
        <div id="listaCompeticoes"></div>
    </div>

    <div id="atletas" class="page">
        <h2>Ranking Global de Atletas</h2>
        <div id="listaAtletas" class="card" style="padding: 0;"></div>
    </div>

    <div id="admin" class="page">
        <h1>Painel FTz</h1>
        <div class="card">
            <input type="password" id="adminSenha" placeholder="Senha Administrativa">
            
            <div class="card" style="border-color: var(--warning);">
                <h3>Novo Evento</h3>
                <input id="compNome" placeholder="Nome do Evento">
                <select id="compTipo" style="width:100%; padding:10px; margin-bottom:10px; background:#0f172a; color:white; border-radius:8px;">
                    <option value="campeonato">Campeonato (Mata-mata)</option>
                    <option value="liga">Liga (Pontos Corridos)</option>
                </select>
                <button class="btn" onclick="criarCompeticao()">PUBLICAR EVENTO</button>
            </div>

            <div id="pendentesSection">
                <h3>🔔 Inscrições Pendentes</h3>
                <div id="pendentes"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Conexão Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCfdwNv4sqmXKqb7Fm7EzNACMJ3aOMQ-Kw",
        authDomain: "ftzchampionships.firebaseapp.com",
        databaseURL: "https://ftzchampionships-default-rtdb.firebaseio.com",
        projectId: "ftzchampionships",
        storageBucket: "ftzchampionships.firebasestorage.app",
        messagingSenderId: "241465233774",
        appId: "1:241465233774:web:877740ce39f06443acf17f",
        measurementId: "G-8N28DNQEGN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(document.getElementById('btn-' + pageId)) document.getElementById('btn-' + pageId).classList.add('active');
    }

    // Criar Competição
    function criarCompeticao() {
        if(document.getElementById('adminSenha').value !== "FTZ123") return alert("Senha de Admin?");
        const nome = document.getElementById('compNome').value;
        const tipo = document.getElementById('compTipo').value;
        if(!nome) return alert("Nomeie o evento!");

        db.ref('eventos/').push({
            nome: nome,
            tipo: tipo,
            status: "aberto",
            dataCriacao: Date.now()
        }).then(() => {
            alert("Sucesso! O " + tipo + " está no ar.");
            document.getElementById('compNome').value = "";
        });
    }

    // Atualização em Tempo Real
    db.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        // Renderizar Torneios e Ligas
        const eventos = data.eventos || {};
        const listaComp = document.getElementById('listaCompeticoes');
        listaComp.innerHTML = "";
        
        for(let id in eventos) {
            const e = eventos[id];
            const badgeClass = e.tipo === 'campeonato' ? 'badge-camp' : 'badge-liga';
            listaComp.innerHTML += `
                <div class="comp-item">
                    <span class="badge ${badgeClass}">${e.tipo.toUpperCase()}</span>
                    <h3 style="text-align:left; margin:0;">${e.nome}</h3>
                    <button class="btn" style="padding:8px; font-size:12px;" onclick="inscreverEvento('${id}', '${e.nome}')">Participar</button>
                </div>`;
        }

        // Renderizar Atletas
        const atletas = data.inscricoes || {};
        const listaA = document.getElementById('listaAtletas');
        listaA.innerHTML = "";
        for(let id in atletas) {
            if(atletas[id].status === "aprovado") {
                listaA.innerHTML += `<div style="padding:10px; border-bottom:1px solid #1e293b;">${atletas[id].nome}</div>`;
            }
        }
    });

    function inscreverEvento(id, nome) {
        const nick = prompt("Confirme seu Nick de Atleta aprovado para participar de: " + nome);
        if(!nick) return;
        db.ref('eventos/' + id + '/participantes').push(nick).then(() => {
            alert("Inscrição confirmada na competição!");
        });
    }
</script>
</body>
</html>
